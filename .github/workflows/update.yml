name: Update Player Points

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes, 17:00–05:00 UTC (noon–midnight ET), on tournament days only
    # Round of 64:  March 19–20
    # Round of 32:  March 21–22
    # Sweet 16:     March 26–27
    # Elite 8:      March 28–29
    # Final Four:   April 4
    # Championship: April 6
    - cron: "0,30 17-23 19-22 3 *"   # March 19–22, 5pm–11:30pm UTC
    - cron: "0,30 0-5  20-23 3 *"    # March 20–23, midnight–5am UTC
    - cron: "0,30 17-23 26-29 3 *"   # March 26–29, 5pm–11:30pm UTC
    - cron: "0,30 0-5  27-30 3 *"    # March 27–30, midnight–5am UTC
    - cron: "0,30 17-23 4 4 *"       # April 4, 5pm–11:30pm UTC
    - cron: "0,30 0-5  5 4 *"        # April 5, midnight–5am UTC
    - cron: "0,30 17-23 6 4 *"       # April 6, 5pm–11:30pm UTC
    - cron: "0,30 0-5  7 4 *"        # April 7, midnight–5am UTC

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests gspread google-auth google-auth-oauthlib python-dotenv

      - name: Write credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 -d > credentials.json
          echo "${{ secrets.GOOGLE_TOKEN }}"       | base64 -d > token.json

      - name: Write .env
        run: echo "GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}" > .env

      - name: Run updater
        run: python main.py
